# fly.toml app configuration file generated for docsign on 2026-06-14T22:36:06+03:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'docsign'
primary_region = 'fra'

[build]

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

[[vm]]
  memory = '1gb'
  cpus = 1
  memory_mb = 1024
[mounts]
  source = "docsign_data"
  destination = "/data"
[env]
  DB_DIR = "/data"